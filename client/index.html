<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>邻里物品借用公告板</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    <header class="header">
      <div class="header-content">
        <h1 class="logo">🏠 邻里物品借用公告板</h1>
        <div class="user-info">
          <div class="user-credit-info">
            <span class="credit-badge" id="creditBadge">🌟 信用分: --</span>
            <span class="balance-badge" id="balanceBadge">💰 余额: ¥--</span>
          </div>
          <button class="btn btn-secondary" id="notificationsBtn">
            🔔 通知
            <span class="badge" id="notificationCount" style="display:none;">0</span>
          </button>
          <button class="btn btn-primary" id="addItemBtn">发布物品</button>
          <button class="btn btn-secondary" id="myBookingsBtn">我的预约</button>
        </div>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab-btn active" data-tab="browse">浏览物品</button>
      <button class="tab-btn" data-tab="popular">热门物品</button>
      <button class="tab-btn" data-tab="calendar">日历视图</button>
    </nav>

    <main class="main-content">
      <section id="browse-tab" class="tab-content active">
        <div class="search-section">
          <div class="search-bar">
            <input type="text" id="searchInput" placeholder="搜索物品...（支持模糊搜索）">
            <button class="btn btn-primary" id="searchBtn">搜索</button>
          </div>
          <div class="category-filter">
            <button class="category-btn active" data-category="">全部</button>
            <button class="category-btn" data-category="工具">工具</button>
            <button class="category-btn" data-category="玩具">玩具</button>
            <button class="category-btn" data-category="户外">户外</button>
            <button class="category-btn" data-category="电子">电子</button>
            <button class="category-btn" data-category="其他">其他</button>
          </div>
        </div>
        
        <div class="items-grid" id="itemsGrid">
        </div>
      </section>

      <section id="popular-tab" class="tab-content">
        <h2 style="margin-bottom:20px;color:#667eea;">🔥 热门物品推荐</h2>
        <p style="margin-bottom:20px;color:#666;">这些物品最受欢迎，使用次数超过10次！</p>
        <div class="items-grid" id="popularItemsGrid">
        </div>
      </section>

      <section id="calendar-tab" class="tab-content">
        <div class="calendar-container">
          <div class="calendar-header">
            <button class="cal-nav" id="prevMonth">‹</button>
            <h2 id="currentMonth">2026年5月</h2>
            <button class="cal-nav" id="nextMonth">›</button>
          </div>
          <div class="calendar-weekdays">
            <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
          </div>
          <div class="calendar-days" id="calendarDays">
          </div>
        </div>
        <div class="date-details" id="dateDetails">
          <h3 id="selectedDateTitle">选择日期查看可用物品</h3>
          <div class="date-items" id="dateItems">
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="modal" id="itemModal">
    <div class="modal-content wide-modal">
      <span class="close">&times;</span>
      <div id="itemDetailContent">
      </div>
    </div>
  </div>

  <div class="modal" id="addItemModal">
    <div class="modal-content">
      <span class="close" id="addItemClose">&times;</span>
      <h2>发布可借用物品</h2>
      <form id="addItemForm">
        <div class="form-group">
          <label>物品名称</label>
          <input type="text" id="itemTitle" required>
        </div>
        <div class="form-group">
          <label>物品描述</label>
          <textarea id="itemDescription" rows="3" required></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>类别</label>
            <select id="itemCategory">
              <option value="工具">工具</option>
              <option value="玩具">玩具</option>
              <option value="户外">户外</option>
              <option value="电子">电子</option>
              <option value="其他">其他</option>
            </select>
          </div>
          <div class="form-group">
            <label>押金（元）</label>
            <input type="number" id="itemDeposit" min="0" value="0">
          </div>
        </div>
        <div class="form-group">
          <label>可用日期（用逗号分隔，如：2026-05-12,2026-05-13）</label>
          <input type="text" id="itemAvailableDates" placeholder="2026-05-12,2026-05-13">
        </div>
        <div class="form-group">
          <label>可用时段（用逗号分隔，如：09:00-12:00,14:00-18:00）</label>
          <input type="text" id="itemAvailableTimes" placeholder="09:00-12:00,14:00-18:00">
        </div>
        <button type="submit" class="btn btn-primary">发布物品</button>
      </form>
    </div>
  </div>

  <div class="modal" id="bookingsModal">
    <div class="modal-content">
      <span class="close" id="bookingsClose">&times;</span>
      <h2>我的预约</h2>
      <div class="bookings-list" id="bookingsList">
      </div>
    </div>
  </div>

  <div class="modal" id="notificationsModal">
    <div class="modal-content">
      <span class="close" id="notificationsClose">&times;</span>
      <h2 style="display:flex;justify-content:space-between;align-items:center;">
        通知中心
        <button class="btn btn-secondary" id="markAllReadBtn" style="padding:6px 12px;font-size:12px;">全部已读</button>
      </h2>
      <div class="notifications-list" id="notificationsList">
      </div>
    </div>
  </div>

  <div class="modal" id="reviewModal">
    <div class="modal-content">
      <span class="close" id="reviewClose">&times;</span>
      <h2>评价</h2>
      <form id="reviewForm">
        <input type="hidden" id="reviewBookingId">
        <input type="hidden" id="reviewTargetId">
        <input type="hidden" id="reviewItemId">
        <div class="form-group">
          <label>评分</label>
          <div class="star-rating" id="starRating">
            <span data-rating="1">★</span>
            <span data-rating="2">★</span>
            <span data-rating="3">★</span>
            <span data-rating="4">★</span>
            <span data-rating="5">★</span>
          </div>
          <input type="hidden" id="reviewRating" value="5">
        </div>
        <div class="form-group">
          <label>评价内容</label>
          <textarea id="reviewContent" rows="4" placeholder="分享你的使用体验..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary">提交评价</button>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/app.js"></script>
</body>
</html>
